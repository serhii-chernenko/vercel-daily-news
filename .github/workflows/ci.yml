name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/**"
      - ".husky/**"
      - ".vscode/**"
      - "docs/**"
      - ".gitignore"
      - "commitlint.config.ts"
      - "skills-lock.json"
      - "pnpm-workspace.yaml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".github/**"
      - ".husky/**"
      - ".vscode/**"
      - "docs/**"
      - ".gitignore"
      - "commitlint.config.ts"
      - "skills-lock.json"
      - "pnpm-workspace.yaml"

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit
