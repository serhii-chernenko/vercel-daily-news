name: Update PRs to assign user and add labels

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  update:
    name: "Update PRs"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit messages
        id: commits
        run: |
          # Get all commit messages in the PR
          COMMIT_MESSAGES=$(git log --format="%s" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          echo "messages<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Automatically assign user to PR
        uses: actions-ecosystem/action-add-assignees@v1
        with:
          github_token: ${{ secrets.PROJECT_ACTIONS_GITHUB_TOKEN }}
          assignees: ${{ github.actor }}

      - name: Determine labels to add
        id: labels
        env:
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          COMMIT_MESSAGES: ${{ steps.commits.outputs.messages }}
        run: |
          labels_to_add=""

          label_types=("feat" "fix" "docs")

          for label in "${label_types[@]}"; do
            should_add_label=false

            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              if printf '%s\n%s\n' "$PR_TITLE" "$PR_BODY" | grep -qiE "^${label}(\(|:)"; then
                should_add_label=true
              fi

              if printf '%s\n' "$COMMIT_MESSAGES" | grep -qiE "(^|[[:space:]])${label}(\(|:)"; then
                should_add_label=true
              fi
            fi
            
            if [[ "$should_add_label" == "true" ]]; then
              if [[ -n "$labels_to_add" ]]; then
                labels_to_add="${labels_to_add}"$'\n'"${label}"
              else
                labels_to_add="$label"
              fi
            fi
          done

          {
            echo "labels<<EOF"
            echo "$labels_to_add"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Add labels
        uses: actions-ecosystem/action-add-labels@v1
        if: steps.labels.outputs.labels != ''
        with:
          labels: ${{ steps.labels.outputs.labels }}
